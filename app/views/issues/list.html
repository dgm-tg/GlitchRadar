<!-- Filter bar -->
<div class="filter-bar">
  <input id="search-input" type="text" placeholder="Search issues…" class="form-input" style="width:240px" />
  <select id="env-filter"  class="form-select"><option value="">All environments</option><option value="production">production</option><option value="staging">staging</option><option value="development">development</option></select>
  <select id="time-filter" class="form-select"><option value="">All time</option><option value="24h">Last 24h</option><option value="14d">Last 14 days</option></select>
  <select id="sort-filter" class="form-select"><option value="last_seen">Last seen</option><option value="first_seen">First seen</option><option value="event_count">Events</option></select>

  <div class="filter-bar-right">
    <button data-status="unresolved" class="btn btn-secondary status-tab active-tab">Unresolved</button>
    <button data-status="resolved"   class="btn btn-secondary status-tab">Resolved</button>
    <button data-status="ignored"    class="btn btn-secondary status-tab">Ignored</button>
  </div>
</div>

<!-- Bulk action toolbar -->
<div id="bulk-toolbar" class="bulk-toolbar hidden">
  <span id="selected-count"></span>
  <button id="bulk-resolve"   class="btn btn-secondary">Mark resolved</button>
  <button id="bulk-unresolve" class="btn btn-secondary">Mark unresolved</button>
  <button id="bulk-ignore"    class="btn btn-secondary">Mark ignored</button>
  <button id="bulk-merge"     class="btn btn-secondary">Merge</button>
</div>

<!-- Table -->
<div class="card">
  <table class="data-table" id="issues-table">
    <thead>
      <tr>
        <th style="width:40px"><input type="checkbox" id="select-all" /></th>
        <th>Issue</th>
        <th style="width:160px">Trend</th>
        <th style="width:80px;text-align:right">Events</th>
      </tr>
    </thead>
    <tbody id="issues-tbody">
      <tr><td colspan="4" class="text-center py-10" style="color:var(--color-text-muted)">Loading…</td></tr>
    </tbody>
  </table>
</div>

<!-- Pagination -->
<div id="pagination" class="pagination">
  <span id="page-info"></span>
  <div class="pagination-buttons">
    <button id="prev-btn" class="btn btn-secondary" disabled>← Previous</button>
    <button id="next-btn" class="btn btn-secondary" disabled>Next →</button>
  </div>
</div>

<script src="/js/issues.js"></script>
