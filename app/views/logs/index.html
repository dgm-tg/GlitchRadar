<!-- Filter bar -->
<div class="filter-bar">
  <div class="input-icon-wrap" style="width:240px">
    <span class="input-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <input id="search-input" type="text" placeholder="Search logs…" class="form-input-icon" />
  </div>
  <select id="level-filter"   class="form-select"><option value="">All levels</option><option value="FATAL">FATAL</option><option value="ERROR">ERROR</option><option value="WARN">WARN</option><option value="INFO">INFO</option><option value="DEBUG">DEBUG</option></select>
  <select id="service-filter" class="form-select"><option value="">All services</option></select>
  <select id="time-filter"    class="form-select"><option value="">All time</option><option value="1h">Last 1h</option><option value="24h">Last 24h</option><option value="7d">Last 7 days</option></select>
  <span id="log-count" class="filter-label" style="margin-left:auto"></span>
</div>

<!-- Terminal log feed -->
<div id="log-terminal" class="log-terminal" style="height:calc(100vh - 236px);min-height:320px">
  <div id="log-feed"></div>
  <div id="log-empty"   class="hidden text-center py-10" style="color:#475569">No logs found.</div>
  <div id="log-loading" class="py-4 text-center" style="color:#475569;font-size:var(--font-size-md)">Loading…</div>
</div>

<!-- Load more -->
<div class="flex justify-center" style="margin-top:var(--space-4)">
  <button id="load-more-btn" class="btn btn-secondary hidden">↓ Load more</button>
  <span   id="no-more-msg"  class="hidden filter-label">All logs loaded</span>
</div>

<script src="/js/logs.js"></script>
