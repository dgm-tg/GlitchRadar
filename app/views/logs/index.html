<!-- Filter bar -->
<div class="flex flex-wrap items-center gap-2 mb-4">
  <div class="relative">
    <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 pointer-events-none" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--color-text-muted)">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search-input" type="text" placeholder="Search logs…"
      class="form-input pl-8" style="width:220px" />
  </div>

  <select id="level-filter" class="form-select">
    <option value="">All levels</option>
    <option value="FATAL">FATAL</option>
    <option value="ERROR">ERROR</option>
    <option value="WARN">WARN</option>
    <option value="INFO">INFO</option>
    <option value="DEBUG">DEBUG</option>
  </select>

  <select id="service-filter" class="form-select">
    <option value="">All services</option>
  </select>

  <select id="time-filter" class="form-select">
    <option value="">All time</option>
    <option value="1h">Last 1h</option>
    <option value="24h">Last 24h</option>
    <option value="7d">Last 7 days</option>
  </select>

  <span id="log-count" class="text-xs ml-auto" style="color:var(--color-text-muted)"></span>
</div>

<!-- Terminal log feed -->
<div id="log-terminal" class="log-terminal" style="height:calc(100vh - 220px);min-height:320px">
  <div id="log-feed"></div>
  <div id="log-empty" class="hidden text-center py-10" style="color:#475569">No logs found.</div>
  <div id="log-loading" class="py-4 text-center text-sm" style="color:#475569">Loading…</div>
</div>

<!-- Load more -->
<div class="flex justify-center mt-4">
  <button id="load-more-btn" class="btn btn-secondary text-xs hidden">
    ↓ Load more
  </button>
  <span id="no-more-msg" class="hidden text-xs" style="color:var(--color-text-muted)">All logs loaded</span>
</div>

<script src="/js/logs.js"></script>
