<!-- Top bar actions -->
<div class="filter-bar">
  <span id="monitor-count" style="font-size:var(--font-size-md);color:var(--color-text-muted)"></span>
  <button id="add-monitor-btn" class="btn btn-primary">+ Add monitor</button>
</div>

<!-- Monitor list -->
<div id="monitor-list" class="flex flex-col gap-3">
  <div id="loading-msg" class="text-center" style="padding:var(--space-8) 0;color:var(--color-text-muted);font-size:var(--font-size-md)">Loading…</div>
</div>

<!-- Empty state -->
<div id="empty-state" class="empty-state hidden">
  <p class="empty-state-title">No monitors yet</p>
  <p class="empty-state-desc">Add a URL and GlitchRadar will ping it every minute.</p>
  <button onclick="document.getElementById('add-monitor-btn').click()" class="btn btn-primary">+ Add monitor</button>
</div>

<!-- Add monitor modal -->
<div id="add-modal" class="modal-overlay hidden">
  <div class="modal-card">
    <h2 class="modal-title">Add monitor</h2>
    <div id="modal-error" class="alert-error hidden mb-4"></div>
    <form id="add-monitor-form" class="form-stack">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" name="name" required class="form-input" placeholder="Production API" />
      </div>
      <div class="form-group">
        <label class="form-label">URL</label>
        <input type="url" name="url" required class="form-input" placeholder="https://api.example.com/health" />
      </div>
      <div class="form-group">
        <label class="form-label">Webhook URL <span style="color:var(--color-text-subtle);font-weight:400">(optional)</span></label>
        <input type="url" name="webhook_url" class="form-input" placeholder="https://hooks.slack.com/…" />
      </div>
      <div class="modal-footer">
        <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
        <button type="submit" class="btn btn-primary">Add monitor</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/uptime.js"></script>
