<div class="flex items-center justify-between mb-5">
  <div></div>
  <button class="btn btn-primary" onclick="document.getElementById('new-project-modal').classList.remove('hidden')">
    + New project
  </button>
</div>

{{#if projects.length}}
<div class="card">
  <table class="data-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>API Key</th>
        <th>Created</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="projects-tbody">
      {{#each projects}}
      <tr>
        <td class="font-medium" style="font-family:var(--font-primary);font-size:var(--font-size-md)">{{this.name}}</td>
        <td>
          <code style="font-family:var(--font-mono);font-size:var(--font-size-xs);background:var(--color-bg);padding:3px 8px;border-radius:var(--radius);border:1px solid var(--color-border);display:inline-block">{{this.api_key}}</code>
        </td>
        <td style="color:var(--color-text-muted);font-size:var(--font-size-md)">{{this.created_at}}</td>
        <td class="text-right">
          <button class="btn btn-ghost" onclick="deleteProject({{this.id}}, this)">Delete</button>
        </td>
      </tr>
      {{/each}}
    </tbody>
  </table>
</div>
{{else}}
<div class="empty-state">
  <p class="empty-state-title">No projects yet</p>
  <p class="empty-state-desc">Create a project to get your API key and start sending data.</p>
</div>
{{/if}}

<!-- New project modal -->
<div id="new-project-modal" class="modal-overlay hidden" style="position:fixed">
  <div class="modal-card">
    <h2 class="modal-title">New project</h2>
    <div id="modal-error" class="alert-error hidden mb-4"></div>
    <form id="new-project-form" class="form-stack">
      <div class="form-group">
        <label class="form-label">Project name</label>
        <input type="text" name="name" required class="form-input" placeholder="my-api" />
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="document.getElementById('new-project-modal').classList.add('hidden')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create project</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/projects.js"></script>
