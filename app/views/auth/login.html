<div class="w-full max-w-sm px-4">
  <!-- Logo -->
  <div class="flex justify-center mb-8">
    <svg width="40" height="40" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="28" height="28" rx="6" fill="#C1121F"/>
      <path d="M8 20L14 8L20 20H16L14 15L12 20H8Z" fill="white"/>
    </svg>
  </div>

  <h1 class="font-heading text-2xl font-semibold text-center mb-1" style="color:var(--color-text)">Sign in to GlitchRadar</h1>
  <p class="text-center text-sm mb-8" style="color:var(--color-text-muted)">
    Don't have an account? <a href="/auth/signup" style="color:var(--color-brand)" class="hover:underline">Sign up</a>
  </p>

  <div id="error-msg" class="hidden mb-4 px-4 py-3 rounded text-sm" style="background:#FEE2E2;color:#991B1B;border:1px solid #FECACA"></div>

  <form id="login-form" class="flex flex-col gap-4">
    <div>
      <label class="block text-xs font-medium mb-1" style="color:var(--color-text-muted);font-family:var(--font-primary)">Email</label>
      <input type="email" name="email" required autocomplete="email"
        class="form-input w-full" placeholder="you@example.com" />
    </div>
    <div>
      <label class="block text-xs font-medium mb-1" style="color:var(--color-text-muted);font-family:var(--font-primary)">Password</label>
      <input type="password" name="password" required autocomplete="current-password"
        class="form-input w-full" placeholder="••••••••" />
    </div>
    <button type="submit" class="btn btn-primary w-full justify-center mt-1" id="submit-btn">
      Sign in
    </button>
  </form>
</div>

<script src="/js/auth.js"></script>
