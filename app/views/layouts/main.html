<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}} — GlitchRadar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Zalando+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/output.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <div class="app-layout">

    <aside class="sidebar">
      <a href="/" class="sidebar-logo flex items-center justify-center mb-6">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="6" fill="#C1121F"/>
          <path d="M8 20L14 8L20 20H16L14 15L12 20H8Z" fill="white"/>
        </svg>
      </a>

      <nav class="sidebar-nav">
        <a href="/issues" class="sidebar-link {{#if isErrors}}active{{/if}}" title="Error Tracking">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </a>
        <a href="/logs" class="sidebar-link {{#if isLogs}}active{{/if}}" title="Logs">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/>
          </svg>
        </a>
        <a href="/transactions" class="sidebar-link {{#if isPerf}}active{{/if}}" title="Performance">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </a>
        <a href="/monitors" class="sidebar-link {{#if isUptime}}active{{/if}}" title="Uptime">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </a>
      </nav>

      <div class="mt-auto flex flex-col gap-1 px-2 pb-2 w-full">
        <a href="/projects" class="sidebar-link {{#if isSettings}}active{{/if}}" title="Projects">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          </svg>
        </a>
        <a href="/auth/logout" class="sidebar-link" title="Sign out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </a>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <h1 class="topbar-title">{{title}}</h1>
        <div class="topbar-controls" id="topbar-controls"></div>
      </header>
      <main class="page-content">
        {{{body}}}
      </main>
    </div>

  </div>
</body>
</html>
